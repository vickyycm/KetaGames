<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palabra del Día - KetaGames</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

</head>

<body>

    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="navbar-logo">KETAGAMES</a>
        <a href="{{ url_for('login') }}" class="navbar-btn">Ingresá</a>
    </nav>

    <section class="game-banner">
        <h1 class="game-banner-title">JUEGO / Palabra del día</h1>
        <div class="game-banner-score">
            Score: <span class="score-value">0</span>
        </div>
    </section>

    <main class="wordle-container">
        
        <div class="wordle-left-column">
            
            <div class="wordle-board">
                <!-- Fila 1 -->
                <div class="wordle-row">
                    <div class="wordle-cell completed">L</div>
                    <div class="wordle-cell completed">U</div>
                    <div class="wordle-cell completed">M</div>
                    <div class="wordle-cell completed">E</div>
                    <div class="wordle-cell completed">N</div>
                </div>
                
                <!-- Fila 2 -->
                <div class="wordle-row">
                    <div class="wordle-cell completed">A</div>
                    <div class="wordle-cell completed">U</div>
                    <div class="wordle-cell completed">D</div>
                    <div class="wordle-cell completed">I</div>
                    <div class="wordle-cell completed">O</div>
                </div>
                
                <!-- Fila 3 -->
                <div class="wordle-row">
                    <div class="wordle-cell completed">L</div>
                    <div class="wordle-cell completed">E</div>
                    <div class="wordle-cell completed">T</div>
                    <div class="wordle-cell completed">R</div>
                    <div class="wordle-cell completed">A</div>
                </div>
                
                <!-- Fila 4 -->
                <div class="wordle-row">
                    <div class="wordle-cell active">G</div>
                    <div class="wordle-cell empty"></div>
                    <div class="wordle-cell empty"></div>
                    <div class="wordle-cell empty"></div>
                    <div class="wordle-cell empty"></div>
                </div>
                
                <!-- Fila 5 -->
                <div class="wordle-row">
                    <div class="wordle-cell empty"></div>
                    <div class="wordle-cell empty"></div>
                    <div class="wordle-cell empty"></div>
                    <div class="wordle-cell empty"></div>
                    <div class="wordle-cell empty"></div>
                </div>
                
                <!-- Fila 6 -->
                <div class="wordle-row">
                    <div class="wordle-cell empty"></div>
                    <div class="wordle-cell empty"></div>
                    <div class="wordle-cell empty"></div>
                    <div class="wordle-cell empty"></div>
                    <div class="wordle-cell empty"></div>
                </div>
            </div>

            <p class="wordle-instruction">Introduce tu siguiente palabra para continuar la cadena.</p>

            <div class="wordle-actions">
                <button class="btn btn-primary">ENVIAR</button>
                <button class="btn btn-outline">PISTA</button>
            </div>
        </div>

        <aside class="wordle-right-column">
            
            <div class="metric-card">
                <h3 class="metric-card-title">RESTANTE</h3>
                <div class="timer-container">
                    <div class="timer-display">00:00</div>
                    <div class="timer-progress">
                        <div class="timer-bar" style="width: 60%;"></div>
                    </div>
                </div>
            </div>

            <div class="metric-card">
                <h3 class="metric-card-title">METRICAS</h3>
                <div class="metrics-list">
                    <div class="metric-item">
                        <span class="metric-label">Palabras encontradas</span>
                        <span class="metric-value">0</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">Tiempo promedio</span>
                        <span class="metric-value">0.0s</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">Exactitud</span>
                        <span class="metric-value">0%</span>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <footer class="footer">
        <div class="footer-column footer-brand">
            <h3 class="footer-title">KETAGAMES</h3>
            <p class="footer-credit">© 2026 KetaGames</p>
        </div>
        <div class="footer-column footer-links">
            <a href="#" class="footer-link">Sobre Nosotros</a>
            <a href="#" class="footer-link">Privacidad</a>
            <a href="#" class="footer-link">Contacto</a>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
